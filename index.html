<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Smart Bell System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- STYLE -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="./styles/global.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="assets/logo/logo.png" class="logo">
      <h2>SMART BELL SYSTEM</h2>
    </div>
    <div id="clock">00:00:00</div>
    <div id="mode-indicator" class="mode-normal">MODE: NORMAL</div>
  </div>

  <!-- CURRENT SESSION -->
  <div id="currentSession" class="current-session">Belum ada sesi</div>

  <!-- SCHEDULE GRID -->
  <div id="scheduleContainer" class="grid-container"></div>

  <!-- STATUS ONLINE/OFFLINE -->
  <div id="status" class="status"></div>

  <!-- FLOATING GEAR -->
  <button id="gearBtn" class="fab">⚙</button>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="admin-panel">
    <h3>Admin Panel</h3>
    <label>Mode</label>
    <select id="modeSelect">
      <option value="normal">Normal</option>
      <option value="exam">Ujian</option>
      <option value="hybrid">Hybrid</option>
      <option value="custom">Custom</option>
    </select>
    <button id="applyMode">Apply Mode</button>
    <button id="toggleBell">Toggle Bell</button>
  </div>

  <!-- SCRIPT -->
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
